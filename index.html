<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Remote Terminal Mirror</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Xterm.js CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
  
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-elevated: #141414;
      --bg-surface: #1a1a1a;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.16);
      --text-primary: #fafafa;
      --text-secondary: #a1a1a1;
      --text-tertiary: #666666;
      --accent: #a855f7;
      --accent-hover: #9333ea;
      --accent-subtle: rgba(168, 85, 247, 0.12);
      --danger: #e5484d;
      --danger-subtle: rgba(229, 72, 77, 0.12);
      --success: #30a46c;
      --success-subtle: rgba(48, 164, 108, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    /* Screen Setup */
    .screen {
      display: none;
      width: 100%;
      height: 100%;
      max-width: 420px;
      padding: 24px;
      flex-direction: column;
      justify-content: center;
      animation: fadeIn 0.3s ease-out;
    }

    .screen.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Card */
    .card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
    }

    /* Typography */
    h1 {
      font-size: 22px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 6px;
      color: var(--accent);
      letter-spacing: -0.4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    /* Forms & Inputs */
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-tertiary);
      margin-bottom: 8px;
      padding-left: 2px;
    }

    .input-wrapper {
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      color: #fff;
      text-align: center;
      letter-spacing: 6px;
      transition: border-color 0.2s ease;
    }

    input[type="text"]::placeholder {
      letter-spacing: normal;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text-tertiary);
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Buttons */
    .btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      background: var(--accent-hover);
    }

    .btn:active {
      opacity: 0.85;
    }

    .btn-danger {
      background: transparent;
      border: 1px solid rgba(229, 72, 77, 0.3);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: var(--danger-subtle);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Sessions View */
    .sessions-container {
      max-height: 280px;
      overflow-y: auto;
      margin-bottom: 24px;
      padding-right: 4px;
    }

    .sessions-container::-webkit-scrollbar {
      width: 4px;
    }
    .sessions-container::-webkit-scrollbar-track {
      background: transparent;
    }
    .sessions-container::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .session-item {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.15s ease, border-color 0.15s ease;
      cursor: pointer;
    }

    .session-item:hover {
      background: var(--accent-subtle);
      border-color: var(--border-hover);
    }

    .session-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .session-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--accent-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    .session-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .session-actions {
      display: flex;
      gap: 6px;
    }

    .btn-tab-link {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-tab-link:hover {
      background: var(--accent-subtle);
      color: var(--text-primary);
      border-color: var(--border-hover);
    }

    .empty-state {
      text-align: center;
      padding: 24px 0;
      color: var(--text-tertiary);
      font-size: 13px;
    }

    /* Terminal View Screen */
    #terminal-screen {
      max-width: 100%;
      height: 100vh;
      height: 100dvh;
      padding: 0;
      display: none;
      flex-direction: column;
    }

    #terminal-screen.active {
      display: flex;
    }

    .terminal-header {
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      flex-shrink: 0;
      z-index: 10;
    }

    .terminal-title-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s ease;
    }

    .back-btn:hover {
      color: var(--text-primary);
    }

    .current-session-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-subtle);
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(168, 85, 247, 0.2);
    }

    .terminal-actions {
      display: flex;
      gap: 6px;
    }

    .terminal-btn {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      border: 1px solid var(--border);
      transition: all 0.15s ease;
    }

    .terminal-btn-logout {
      background: var(--danger-subtle);
      color: var(--danger);
      border-color: rgba(229, 72, 77, 0.2);
    }

    .terminal-btn-logout:hover {
      background: var(--danger);
      color: #fff;
    }

    .terminal-btn-newtab {
      background: transparent;
      color: var(--text-secondary);
    }

    .terminal-btn-newtab:hover {
      background: var(--accent-subtle);
      color: var(--text-primary);
    }

    #terminal-container {
      flex: 1;
      width: 100%;
      height: calc(100dvh - 48px);
      max-height: calc(100dvh - 48px);
      background: var(--bg);
      padding: 4px 8px;
      position: relative;
      overflow: hidden;
    }

    #terminal-container .xterm,
    #terminal-container .xterm-screen {
      height: 100% !important;
    }

    /* Xterm overrides */
    .xterm {
      padding: 4px;
    }
    
    .xterm-viewport::-webkit-scrollbar {
      width: 4px;
    }
    .xterm-viewport::-webkit-scrollbar-track {
      background: transparent;
    }
    .xterm-viewport::-webkit-scrollbar-thumb {
      background: transparent;
    }

    /* Notification Banner */
    .notification {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .notification.show {
      transform: translateX(-50%) translateY(0);
    }

    .notification.error {
      border-left: 3px solid var(--danger);
    }

    .notification.success {
      border-left: 3px solid var(--success);
    }

    /* Floating Action Button for Keyboard */
    .fab-keyboard {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--bg-surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: all 0.15s ease;
    }
    
    .fab-keyboard:active {
      background: var(--accent-subtle);
      color: var(--text-primary);
    }
  </style>
</head>
<body>

  <!-- NOTIFICATION BANNER -->
  <div id="notification" class="notification error">
    <span id="notification-message">Authentication failed</span>
  </div>

  <!-- SCREEN 1: OTP AUTHENTICATION -->
  <div id="auth-screen" class="screen active">
    <div class="card">
      <h1>Secure Terminal</h1>
      <p class="subtitle">Enter the 6-digit OTP pairing code printed on the host laptop console to connect.</p>
      
      <div class="form-group">
        <label for="otp-input">Pairing Code</label>
        <div class="input-wrapper">
          <input type="text" id="otp-input" maxlength="6" placeholder="000000" inputmode="numeric" pattern="[0-9]*">
        </div>
      </div>
      
      <button id="auth-btn" class="btn">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        Pair Device
      </button>
    </div>
  </div>

  <!-- SCREEN 2: SESSION PICKER -->
  <div id="picker-screen" class="screen">
    <div class="card">
      <h1>Active Sessions</h1>
      <p class="subtitle">Select a running session below or open one in a new browser tab to view them side-by-side.</p>
      
      <div class="sessions-container" id="sessions-list">
        <!-- Rendered dynamically -->
        <div class="empty-state">Scanning for active sessions...</div>
      </div>
      
      <div style="display: flex; flex-direction: column; gap: 10px;">
        <button id="new-session-btn" class="btn">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          New Terminal
        </button>
        <button id="refresh-btn" class="btn btn-secondary">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5"/><path stroke-linecap="round" stroke-linejoin="round" d="M20.49 9A9 9 0 005.64 5.64L4 9m16 6l-1.64 3.36A9 9 0 013.51 15"/></svg>
          Refresh
        </button>
        <button id="logout-btn" class="btn btn-danger">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Revoke Credentials
        </button>
      </div>
    </div>
  </div>

  <!-- SCREEN 3: INTERACTIVE TERMINAL -->
  <div id="terminal-screen" class="screen">
    <div class="terminal-header">
      <div class="terminal-title-container">
        <button id="term-back-btn" class="back-btn">&#8592;</button>
        <span id="session-title" class="current-session-label">session:0</span>
      </div>
      <div class="terminal-actions">
        <button id="term-newtab-btn" class="terminal-btn terminal-btn-newtab">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          New Tab
        </button>
        <button id="term-logout-btn" class="terminal-btn terminal-btn-logout">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          Revoke
        </button>
      </div>
    </div>
    <div id="terminal-container"></div>
    <!-- Floating Keyboard Button -->
    <button id="fab-keyboard" class="fab-keyboard" title="Open Keyboard">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 8a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/><path d="M7 14h.01M11 14h.01M15 14h.01M9 10h.01M13 10h.01M17 10h.01"/></svg>
    </button>
  </div>

  <!-- Scripts -->
  <!-- Xterm.js Core & Addons -->
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  
  <!-- Main Application Script -->
  <script src="app.js"></script>
</body>
</html>
